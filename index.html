<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Gasolineras PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gasolineras en Tiempo Real</h1>
        
        <div class="search-box">
            <select id="provincia" onchange="cargarMunicipios()">
                <option value="">Cargando provincias...</option>
            </select>

            <select id="municipio">
                <option value="">Selecciona Municipio</option>
            </select>
            
            <button onclick="buscarGasolineras()">Ver Precios</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
